<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!--
    NOTA DE SEGURANÇA:
    A Content-Security-Policy é definida via HTTP header no servidor de produção
    (GitHub Pages, Nginx, etc.) para ter efeito completo. Uma <meta> CSP tem
    limitações: não cobre todos os tipos de recursos e é ignorada por alguns
    ambientes de desenvolvimento (Live Server, etc.).

    Header recomendado para produção:
    Content-Security-Policy:
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      media-src 'self' blob:;
      connect-src 'self' https://seu-servidor-tts.com;
  -->

  <title>Johnson English — Laboratório de Língua</title>
  <meta name="description" content="Laboratório acadêmico de inglês baseado no método do Trivium: Gramática, Lógica, Retórica." />

  <!-- Stylesheets: base → layout → mobile -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <!--
    SHELL DA APLICAÇÃO SPA
    Todas as views são injetadas em #app-root pelo router (js/router.js).
    O estado de navegação é gerenciado por js/state.js.
  -->

  <header id="site-header" role="banner">
    <div class="header-inner">
      <a href="#/" class="site-logo" aria-label="Johnson English — Início">
        <span class="logo-title">Johnson English</span>
        <span class="logo-subtitle">Laboratório de Língua</span>
      </a>

      <nav id="main-nav" role="navigation" aria-label="Navegação principal">
        <button id="nav-toggle" class="nav-toggle" aria-expanded="false" aria-controls="nav-links">
          <span class="sr-only">Menu</span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
        </button>

        <ul id="nav-links" class="nav-links" role="list">
          <li><a href="#/"      class="nav-link" data-route="home">Início</a></li>
          <li><a href="#/levels" class="nav-link" data-route="levels">Níveis</a></li>
          <li><a href="#/guia"  class="nav-link" data-route="guia">Guia do Professor</a></li>
          <li><a href="#/plano" class="nav-link" data-route="plano">Plano de Aula</a></li>
          <li><a href="#/about" class="nav-link" data-route="about">Sobre</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Breadcrumb: populado dinamicamente pelo router -->
  <nav id="breadcrumb" class="breadcrumb" aria-label="Caminho de navegação"></nav>

  <!-- Região principal: todas as views são renderizadas aqui -->
  <main id="app-root" role="main" aria-live="polite">
    <div id="loading-screen" class="loading-screen">
      <p>Carregando…</p>
    </div>
  </main>

  <!-- Banner de status do áudio: aparece ao detectar o backend -->
  <div id="audio-banner" class="audio-banner hidden" aria-live="polite" role="status"></div>

  <footer id="site-footer" role="contentinfo">
    <div class="footer-inner">
      <p class="footer-text">
        Johnson English &mdash; Parte do
        <a href="#/about" class="footer-eco-link">ecossistema educacional</a>:
        <span class="ecosystem-list">
          <a href="https://luddevergard3n.github.io/Herodoto/"     target="_blank" rel="noopener noreferrer">Heródoto</a> &bull;
          <a href="https://luddevergard3n.github.io/euclides/"     target="_blank" rel="noopener noreferrer">Euclides</a> &bull;
          <a href="https://luddevergard3n.github.io/quintiliano/"  target="_blank" rel="noopener noreferrer">Quintiliano</a> &bull;
          <a href="https://luddevergard3n.github.io/lavoisier/"    target="_blank" rel="noopener noreferrer">Lavoisier</a> &bull;
          <a href="https://luddevergard3n.github.io/humboldt/"     target="_blank" rel="noopener noreferrer">Humboldt</a> &bull;
          <a href="https://luddevergard3n.github.io/archimedes/"   target="_blank" rel="noopener noreferrer">Archimedes</a>
        </span>
      </p>
    </div>
  </footer>

  <!-- Bootstrap da aplicação: type="module" habilita ES Module imports -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
